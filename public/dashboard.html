<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Auto DM - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { color: white; margin-bottom: 30px; text-align: center; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.1em; opacity: 0.9; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); text-align: center; }
        .stat-card h3 { color: #667eea; margin-bottom: 10px; font-size: 0.9em; text-transform: uppercase; }
        .stat-card .number { font-size: 2.5em; font-weight: bold; color: #764ba2; }
        .leads-section { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        .leads-section h2 { color: #667eea; margin-bottom: 20px; font-size: 1.8em; }
        .leads-table { width: 100%; border-collapse: collapse; }
        .leads-table thead { background: #f5f5f5; }
        .leads-table th { padding: 12px; text-align: left; color: #333; font-weight: 600; border-bottom: 2px solid #ddd; }
        .leads-table td { padding: 12px; border-bottom: 1px solid #eee; }
        .leads-table tbody tr:hover { background: #f9f9f9; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.85em; font-weight: 600; }
        .status-new { background: #e3f2fd; color: #1976d2; }
        .status-contacted { background: #f3e5f5; color: #7b1fa2; }
        .leads-table button { background: #667eea; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.85em; }
        .leads-table button:hover { background: #764ba2; }
        .empty-state { text-align: center; padding: 40px 20px; color: #999; }
        .refresh-info { text-align: center; color: #999; font-size: 0.9em; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Pro Auto DM Dashboard</h1>
            <p>Real-time analytics and lead management</p>
        </div>
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Messages</h3>
                <div class="number" id="totalMessages">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Leads</h3>
                <div class="number" id="totalLeads">0</div>
            </div>
            <div class="stat-card">
                <h3>Conversion Rate</h3>
                <div class="number" id="conversionRate">0%</div>
            </div>
        </div>
        <div class="leads-section">
            <h2>💼 Leads</h2>
            <table class="leads-table" id="leadsTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Platform</th>
                        <th>Interest</th>
                        <th>Contact</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="leadsBody">
                </tbody>
            </table>
            <div class="empty-state" id="emptyState" style="display: none;">
                <p>No leads collected yet. They will appear here once users start messaging! 🚀</p>
            </div>
        </div>
        <div class="refresh-info">
            <p>⟳ Auto-refreshing every 30 seconds...</p>
        </div>
    </div>
    <script>
        async function loadStats() {
            try {
                const response = await fetch('/dashboard/stats');
                const data = await response.json();
                document.getElementById('totalMessages').textContent = data.totalMessages || 0;
                document.getElementById('totalLeads').textContent = data.totalLeads || 0;
                const rate = data.totalMessages > 0 ? ((data.totalLeads / data.totalMessages) * 100).toFixed(1) : 0;
                document.getElementById('conversionRate').textContent = rate + '%';
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        async function loadLeads() {
            try {
                const response = await fetch('/dashboard/leads');
                const leads = await response.json();
                const leadsBody = document.getElementById('leadsBody');
                const emptyState = document.getElementById('emptyState');
                if (!leads || leads.length === 0) {
                    leadsBody.innerHTML = '';
                    emptyState.style.display = 'block';
                    return;
                }
                emptyState.style.display = 'none';
                leadsBody.innerHTML = leads.map(lead => `
                    <tr>
                        <td>${lead.name || 'Unknown'}</td>
                        <td>${lead.platform || 'N/A'}</td>
                        <td>${lead.interest || 'General'}</td>
                        <td>${lead.contact_number || 'N/A'}</td>
                        <td><span class="status-badge status-${lead.status || 'new'}">${(lead.status || 'new').toUpperCase()}</span></td>
                        <td>${new Date(lead.created_at).toLocaleDateString()}</td>
                        <td><button onclick="sendFollowUp(${lead.id})">Follow Up</button></td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading leads:', error);
            }
        }
        async function sendFollowUp(leadId) {
            try {
                const response = await fetch('/dashboard/resend-followup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ leadId })
                });
                const data = await response.json();
                alert(data.message || 'Follow-up sent!');
            } catch (error) {
                console.error('Error sending follow-up:', error);
                alert('Failed to send follow-up');
            }
        }
        function refreshDashboard() {
            loadStats();
            loadLeads();
        }
        refreshDashboard();
        setInterval(refreshDashboard, 30000);
    </script>
</body>
</html>
